<div class="container">
  <h2>Adicionar PDF</h2>
  <p *ngIf="sucesso()" class="sucesso">PDF adicionado com sucesso!</p>
  <div class="usuario-logado">
    <span>Usuário: <strong>{{ getUsuario() }}</strong></span>
  </div>
  <div class="form-group">
    <label for="nome">Nome do PDF:</label>
    <input type="text" id="nome" [ngModel]="nome()" (ngModelChange)="nome.set($event)" name="nome" required>
  </div>
  <div class="form-group">
    <label for="link">Link do Google Drive:</label>
    <input type="text" id="link" [ngModel]="link()" (ngModelChange)="link.set($event)" name="link" required>
  </div>
  <button (click)="salvar()">Adicionar PDF</button>
</div>
